{% extends "base.html" %}

{% block title %}Upload Due List{% endblock %}

{% block content %}
<div class="container">
    <h2 class="text-center mb-4">Upload Due List</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="csv_file" class="form-label">Upload CSV File</label>
            <input type="file" name="csv_file" id="csv_file" class="form-control" required>
            <small class="form-text text-muted">Please upload a CSV file with columns <strong>PRN</strong> and <strong>Due Reason</strong>.</small>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
</div>
{% endblock %}
